<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RomaLauncher</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/MD4pvg1C/Romaball.png">
    
    <style>
        /* Limpa as bordas padrão e deixa o resto do site branco */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; 
        }

        /* O BLOCO VINHO */
        .bloco-topo {
            background-color: #8B0000;
            width: 100%;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* A SUA LOGO PRINCIPAL - Centralizada */
        .bloco-topo .logo-principal {
            height: 65px;
            width: auto;
            display: block;
        }

        /* CONTAINER DOS BOTÕES SOCIAIS */
        .botoes-sociais {
            position: absolute;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .botoes-sociais a {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .botoes-sociais img {
            height: 22px;
            width: auto;
        }

        .botoes-sociais a:hover {
            transform: scale(1.05);
        }

        /* ÁREA DO JOGO (PARTE BRANCA) */
        .conteudo-principal {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            background-color: #ffffff;
        }

        /* CONTAINER PARA ALINHAR O IFRAME E O BOTÃO ABAIXO */
        .area-jogo {
            display: flex;
            flex-direction: column;
            width: 800px;
        }

        /* ESTILO DO IFRAME DO JOGO */
        .area-jogo iframe {
            border: none;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            height: 600px;
        }

        /* BOTÃO DE TELA CHEIA */
        .botao-fullscreen {
            align-self: flex-end;
            margin-top: 10px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        .botao-fullscreen img {
            height: 25px;
            width: auto;
        }

        .botao-fullscreen:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="bloco-topo">
        <img class="logo-principal" src="https://i.ibb.co/21ZsV5Hd/Logo-Roma-Launcher-1.png" alt="Logo RomaLauncher">

        <div class="botoes-sociais">
            <a href="https://ko-fi.com/romaball#linkModal" target="_blank">
                <img src="https://cdn.prod.website-files.com/5c14e387dab576fe667689cf/670f5a01229bf8a18f97a3c1_favion.png" alt="Ko-fi Romaball">
            </a>
            <a href="https://www.youtube.com/@Romaball-official" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" alt="Canal Romaball">
            </a>
        </div>
    </div>

    <div class="conteudo-principal">
        <div class="area-jogo">
            <!-- Link do Subway Surfers substituído pelo novo jogo enviado -->
            <iframe 
                id="jogo-tela" 
                src="https://igroutka.ru/loader/game/26471/" 
                allowfullscreen>
            </iframe>

            <button class="botao-fullscreen" onclick="entrarTelaCheia()" title="Tela Cheia">
                <img src="https://static.thenounproject.com/png/66373-200.png" alt="Tela Cheia">
            </button>
        </div>
    </div>

    <script>
        function entrarTelaCheia() {
            var iframe = document.getElementById('jogo-tela');
            if (iframe.requestFullscreen) {
                iframe.requestFullscreen();
            } else if (iframe.webkitRequestFullscreen) {
                iframe.webkitRequestFullscreen();
            } else if (iframe.msRequestFullscreen) {
                iframe.msRequestFullscreen();
            }
        }
    </script>

</body>
</html>
